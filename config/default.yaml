project:
  name: "generic"
  language: "any"
  file_extensions: []            # empty = scan all files
  source_dir: ""                 # empty = project root
  framework: "generic"

api:
  provider: "openai_compat"    # openai_compat | anthropic | google
  base_url: "http://localhost:1234/v1"
  api_key: ""                  # empty = env var or not needed for local
  model: "qwen/qwen3-coder-30b"

llm:
  temperature: 0
  seed: 42
  max_tokens: 4096
  stream: false
  profile: "auto"              # auto | compact | default
                               # auto: compact if max_context_tokens <= 8192, else default
                               # compact: short prompt, core tools only — for small local models
                               # default: full prompt, all tools, memory/skills/context

budget:
  max_iterations: 50
  max_total_tokens: 500000
  max_context_tokens: 32000

security:
  allowed_path_prefix: ""       # empty = unrestricted (blocklist only); set e.g. "Assets/" to restrict
  blocked_prefixes:             # paths CLU can never read or write
    - "C:/Windows"
    - "C:/Program Files"
    - "C:/Program Files (x86)"
    - "/etc"
    - "/bin"
    - "/usr"
    - "/sys"
    - "/proc"
    - ".git"
  write_blocked_prefixes:       # paths CLU can read but never write
    - ".clu"
  max_file_read_size: 102400
  max_file_write_size: 51200
  max_search_results: 50
  max_list_results: 200

validation:
  enabled: true
  validator: "csharp"            # "csharp" | "none"
  unity_dll_path: "C:/Program Files/Unity/Hub/Editor/6000.0.58f2/Editor/Data/Managed/UnityEngine"
  dotnet_path: "dotnet"
  lang_version: "9.0"
  target_framework: "netstandard2.1"
  validation_timeout: 30

tools:
  enabled:
    - think
    - read_file
    - list_files
    - search_in_files
    - write_file
    - memory
    - delegate
    - validate_csharp
    - unity_logs
    - manage_schedules
    - manage_context

heartbeat:
  enabled: true
  interval: 300                  # seconds between checks when queue is empty
  auto_fix_on_error: true        # auto-enqueue task when checks detect issues
  auto_fix_compile_errors: true  # backward compat alias
  max_auto_tasks_per_hour: 10
  large_file_threshold: 300      # lines — flag source files exceeding this
  checks:
    - unity_compile
    - new_files
    - todo_markers
    - large_files

notifications:
  desktop: false                 # OS desktop notifications (Windows toast / macOS / Linux)
  discord_webhook: ""            # Discord webhook URL (leave empty to disable)
  slack_webhook: ""              # Slack webhook URL (leave empty to disable)

webhooks:
  github_secret: ""              # GitHub webhook secret for signature verification

paths:
  backup_dir: "backups"
  log_dir: "logs"
  prompts_dir: "prompts"

skills:
  enabled: true                  # Set to false to disable the entire skills system
  user_dir: ""                   # Override user skill dir (default: ~/.clu/skills)
  project_dir: ""                # Project-local skills dir (default: .clu/skills relative to project)
  prompt_budget: 12000           # Max total chars from skill prompts per agent run

  # Community registry (pull new skills from a shared GitHub repo)
  registry_url: "https://github.com/Continuous-Learning-Utility/clu-skills"
  registry_sync_enabled: false   # Set to true to auto-pull community skills
  registry_sync_interval: 86400  # Seconds between syncs (default: 24h)

  # Autonomous skill generation (agent learns from its own task history)
  auto_generate: true            # Auto-generate skills after every N tasks
  auto_publish: false            # Auto-push generated skills to registry (manual by default)
  github_token: ""               # GitHub PAT with repo scope (required for publishing)
  generate_after_n_tasks: 10     # Analyze patterns every N completed tasks
  generate_min_occurrences: 3    # Pattern must appear at least this many times
  generate_min_success_rate: 0.7 # Minimum success rate to consider a skill candidate

# ---- Modules (external integrations) ----
modules:
  enabled: true                  # Master switch for module system
  auto_start: true               # Auto-start enabled modules on server launch
  # Per-module config (keyed by module name):
  # whatsapp:
  #   enabled: true
  #   phone_number_id: "..."
  #   access_token: "..."
